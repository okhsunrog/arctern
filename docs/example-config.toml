# arctern.toml — annotated example translating two Go zrepl jobs into
# arctern's TOML schema. See specs/003-config-and-snap-job/spec.md for
# the full schema reference.
#
# Snapshot tags use `<prefix><RFC3339-utc-no-colons>` (e.g.,
# `zrepl_20260509T134500Z`). Wire-compatible with Go zrepl per the
# arctern constitution principle VII — a host migrating from zrepl can
# keep its existing snapshot history under arctern.
#
# IMPORTANT differences from zrepl YAML:
#
# 1. The filesystems map `{ "okdata/data/nas": true, ... }` becomes one
#    `[[jobs.filesystems]]` table per filesystem. Booleans are
#    inappropriate in TOML for this purpose; explicit per-table `path`
#    fields are clearer and let us add `recursive` + `exclude` cleanly.
#
# 2. zrepl's `path<` recursive include syntax becomes
#    `recursive = true` plus an explicit `exclude = [...]` array of
#    paths to skip. To snapshot only the descendants of a recursive
#    root (not the root itself), include the root path in `exclude`.

# ─── databak: 4-hourly snapshots of three nas/root/home filesystems ──

[[jobs]]
type = "snap"
name = "databak"

[[jobs.filesystems]]
path = "okdata/data/nas"
[[jobs.filesystems]]
path = "okdata/data/root"
[[jobs.filesystems]]
path = "okdata/data/home"

[jobs.snapshotting]
type = "periodic"
interval = "4h"
prefix = "zrepl_"

# Keep 6 snapshots from the last 24h (one per 4h slot) plus 14 daily
# snapshots from before that. Snapshots NOT matching `^zrepl_.*` (the
# user's manual snapshots, snapshots from another tool, etc.) survive
# unconditionally because the second rule below protects them.
[[jobs.pruning.keep]]
type = "grid"
grid = "6x4h | 14x1d"
regex = "^zrepl_.*"

# negate = true means "destroy snapshots whose name MATCHES this regex"
# — so the rule's destroy list is exactly the zrepl_-prefixed ones,
# and the destroy list across rules is the intersection. Manual
# snapshots are NOT in this rule's destroy list, so they are NEVER
# destroyed. This is the standard zrepl idiom paired with a grid rule.
[[jobs.pruning.keep]]
type = "regex"
regex = "^zrepl_.*"
negate = true

# ─── rootbak: daily snapshots of the system dataset ──────────────────

[[jobs]]
type = "snap"
name = "rootbak"

[[jobs.filesystems]]
path = "okdata/ROOT/default"

[jobs.snapshotting]
type = "periodic"
interval = "1d"
prefix = "zrepl_"

[[jobs.pruning.keep]]
type = "grid"
grid = "7x1d"
regex = "^zrepl_.*"

[[jobs.pruning.keep]]
type = "regex"
regex = "^zrepl_.*"
negate = true

# ─── push_to_local: replicate snapshots to a sink peer ──────────────
#
# This is the active sender side. The peer ("10.77.77.100:8888")
# runs an arctern daemon with a `[[jobs]] type = "sink"` block
# bound to the same port. WireGuard sits underneath; the QUIC TLS
# layer accepts any cert (constitution V — WG is the perimeter).
#
# Path mapping is literal concatenation:
#   sender path  okdata/data/home
#   target.root_fs  okdata/backups/laptop
#   becomes      okdata/backups/laptop/okdata/data/home
# on the receiver. NO path stripping. The full sender path is
# preserved under the receiver's root_fs so a single sink can host
# many sender peers without name collisions.
#
# `interval` is the planner-cycle interval — the snap job above
# decides snapshot frequency. The push job's only job is to ferry
# whatever the sender currently has across to the receiver. Use
# `POST /api/v1/jobs/push_to_local/wakeup` (or the dashboard
# button) to trigger an immediate cycle.

[[jobs]]
type = "push"
name = "push_to_local"
connect = "10.77.77.100:8888"
interval = "15m"
# server_name defaults to "arctern" — matches the sink's self-signed
# cert CN. Override only if the peer is using a different identity.

[[jobs.filesystems]]
path = "okdata/data/home"
[[jobs.filesystems]]
path = "okdata/data/nas"
[[jobs.filesystems]]
path = "okdata/data/root"

[jobs.target]
root_fs = "okdata/backups/laptop"

# All four flags default true — they map to `zfs send -w -e -c -L`
# which is what zrepl's canonical push job uses. Set `encrypted = false`
# only if the source dataset isn't encrypted and you want the receiver
# to see the property values in cleartext.
[jobs.send]
encrypted = true
embedded_data = true
compressed = true
large_blocks = true

# Exactly one of `prefix` (sugar for `^<escaped>`) or `regex`. The
# planner only considers snapshots matching this filter — keeps user-
# created or system-created snapshots out of the replication loop.
[jobs.snapshot_filter]
prefix = "zrepl_"
