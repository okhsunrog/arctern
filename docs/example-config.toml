# arctern.toml — annotated example.
#
# This file shows the *idiomatic* form. Every section below has more
# verbose long-hand equivalents; you only need them when you want to
# override per-job. Snapshot tags use `<prefix><RFC3339-utc-no-colons>`
# (e.g. `zrepl_20260514T134500Z`) — wire-compatible with Go zrepl, so a
# host migrating from zrepl can keep its existing snapshot history.

# ─── Host-wide defaults ──────────────────────────────────────────────
#
# Applied to every job at config-load time. Per-job overrides win.
# Keeps the rest of the file short — operators see the *interesting*
# differences, not boilerplate.

state_dir = "/var/lib/arctern"

[defaults]
# Prefix used by snap jobs creating snapshots, push jobs filtering
# which snapshots to replicate, and the auto-generated prune rules.
# Pick one string and forget about it.
prefix = "zrepl_"

[defaults.snapshotting]
# Cadence for snap jobs that don't set their own interval.
interval = "15m"

[defaults.pruning]
# Grid used by snap jobs that don't set their own pruning.
# Format: <count>x<interval> | ... (oldest to youngest, left to right).
grid = "4x15m | 24x1h | 14x1d"
# `protect_non_prefixed = true` (the default) auto-appends a
# `{ type: regex, regex: "^<prefix>.*", negate: true }` rule so
# snapshots WITHOUT the prefix survive prune. This is the standard
# zrepl idiom for protecting manual snapshots.
protect_non_prefixed = true

# ─── Outbound SSH peers ──────────────────────────────────────────────

[[peers]]
name = "nas-home"
ssh_target = "arctern-replicator@10.44.44.1"

[[peers]]
name = "nas-remote"
ssh_target = "arctern-replicator@10.66.66.2"

# ─── databak: snap job ───────────────────────────────────────────────
#
# Filesystems map: keys with trailing `/` mean "include this subtree"
# (recursive), bare keys mean exact-match. `false` excludes a path
# from any subtree include it sits under.

[[jobs]]
type = "snap"
name = "databak"
filesystems = { "okdata/data/nas" = true, "okdata/data/root" = true, "okdata/data/home" = true }
# snapshotting + pruning omitted — inherited from [defaults] above.

# ─── rootbak: snap with non-default interval ────────────────────────

[[jobs]]
type = "snap"
name = "rootbak"
filesystems = { "okdata/ROOT/default" = true }
[jobs.snapshotting]
interval = "1d"
[jobs.pruning]
keep = [
  { type = "grid", grid = "7x1d", regex = "^zrepl_.*" },
  { type = "regex", regex = "^zrepl_.*", negate = true },
]

# ─── push_to_nas: replicate to home, fall back to remote ────────────
#
# `targets` is ordered: the cycle picks the first peer whose
# reachability is "Connected" and uses it. When 10.44 is unreachable
# (laptop is off the home network), 10.66 takes over. Each peer keeps
# its own cursor bookmark, so the offline peer catches up cleanly when
# it's reachable again.

[[jobs]]
type = "push"
name = "push_to_nas"
targets = ["nas-home", "nas-remote"]
interval = "15m"
dry_run = true # first-run safety: plan and log actions without sending
filesystems = { "novafs/arch0/" = true, "novafs/arch0" = false, "novafs/arch0/data" = false }
[jobs.target]
root_fs = "okdata/backups/laptop"
# `send` flags default to encrypted+embedded+compressed+large_blocks =
# all true — what `zfs send -w -e -c -L` produces. Override one off with
# `[jobs.send] encrypted = false` if you want plaintext.

# ─── received_prune: receiver-side retention ─────────────────────────
#
# Prune-only job — never creates snapshots. Use this on the receiver
# (the NAS) to apply a longer-form retention to whatever the laptop
# pushes. zrepl's `push.pruning.keep_receiver` lives here in arctern.

[[jobs]]
type = "prune"
name = "received_prune"
interval = "1h"
filesystems = { "okdata/backups/laptop/" = true, "okdata/backups/laptop" = false }
[jobs.pruning]
keep = [
  { type = "grid", grid = "1x1h | 24x1h | 14x1d | 8x1w", regex = "^zrepl_.*" },
  { type = "regex", regex = "^zrepl_.*", negate = true },
]

# ─── allowed_clients: NAS-side ACL ──────────────────────────────────
#
# This block lives in the NAS's arctern.toml (despite appearing here
# for documentation). On the NAS, sshd's authorized_keys ForcedCommand
# is `arctern stdinserver-dispatch laptop_nova`; the dispatcher matches
# that argv against `identity` and consults this row before serving any
# control or recv channel.

[[allowed_clients]]
identity = "laptop_nova"
fingerprint = "SHA256:abc123..."
jobs = ["push_to_nas"]
operations = ["control", "control:discard_partial_recv", "recv"]
# Add "control:destroy_snapshot" only if this client should be allowed
# to remotely delete snapshots inside root_fs.
root_fs = "okdata/backups/laptop"

# Per-client recv tuning. Maps zrepl's `recv.properties.inherit` and
# `recv.properties.override` 1:1, applied as `zfs recv -x <key>` (force
# inherit from parent) and `-o <k>=<v>` (force-set). The pattern below
# matches an "untrusted-receiver" sink that wants its children
# unmounted by default.
[allowed_clients.recv]
inherit_properties = ["mountpoint"]
override_properties = { canmount = "off", "org.openzfs.systemd:ignore" = "on" }
