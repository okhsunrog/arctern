name: Release

# Tag push (v*) builds static musl binaries for both architectures and
# attaches them to a GitHub Release. workflow_dispatch runs the same
# build for verification without publishing anything.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6

      # The daemon embeds admin-ui/dist at compile time (memory-serve),
      # so the real UI must be built before cargo.
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          working-directory: admin-ui
      - run: vp install
        working-directory: admin-ui
      - run: vp run build
        working-directory: admin-ui

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # zig is the cross C toolchain: it compiles the bundled sqlite and
      # mimalloc C code for both musl targets without target-specific
      # gcc packages.
      - uses: mlugg/setup-zig@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          short=$(echo '${{ matrix.target }}' | sed 's/-unknown-/-/')
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/arctern" dist/
          tar -C dist -czf "arctern-${short}.tar.gz" arctern
          rm dist/arctern

      - uses: actions/upload-artifact@v4
        with:
          name: arctern-${{ matrix.target }}
          path: arctern-*.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - run: sha256sum arctern-*.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            arctern-*.tar.gz
            SHA256SUMS
          generate_release_notes: true
